<a href="#main-content" class="skip-to-main">Skip to main content</a>

<div class="app-container">
  <aside class="app-sidebar">
    <div class="sidebar-header">
      <a href="/" class="app-brand">
        <div class="app-brand-icon">
          <svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="8" fill="#4F46E5"/>
            <path d="M12 28V12H20C22.2091 12 24 13.7909 24 16C24 18.2091 22.2091 20 20 20H12M20 20L28 28" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="28" cy="12" r="3" fill="#818CF8"/>
          </svg>
        </div>
        <span class="app-brand-text">PayGlobe</span>
      </a>
      <p class="app-tagline">Global payroll intelligence</p>
    </div>

    <nav class="app-nav">
      <ul class="nav-list">
        <li class="nav-item">
          <a routerLink="/processor" routerLinkActive="active" class="nav-link">
            <span class="nav-icon"><app-icon-chart /></span>
            <span class="nav-label">Processor</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/countries" routerLinkActive="active" class="nav-link">
            <span class="nav-icon"><app-icon-globe /></span>
            <span class="nav-label">Country Studio</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/rules" routerLinkActive="active" class="nav-link">
            <span class="nav-icon"><app-icon-settings /></span>
            <span class="nav-label">Rule Config</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/geo-groups" routerLinkActive="active" class="nav-link">
            <span class="nav-icon"><app-icon-map-pin /></span>
            <span class="nav-label">Geo Groups</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">AD</div>
        <div class="user-info">
          <span class="user-name">Admin Desk</span>
          <span class="user-role">Platform Operations</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="app-main-content" id="main-content" role="main">
    <header class="app-header">
      <!-- Dynamic header content will be injected here by router components -->
      <div class="header-actions">
        <button class="btn btn-secondary">Support Desk</button>
      </div>
    </header>

    <div class="app-content-area">
      <router-outlet></router-outlet>
    </div>
  </main>

  <app-ui-loader></app-ui-loader>
</div>

<!-- Toast Container -->
<app-toast-container></app-toast-container>

<!-- Root Level Modal Container -->
@if (modal.isModalOpen()) {
  <app-ui-modal 
    [title]="modal.modalConfig().title" 
    [side]="modal.modalConfig().side" 
    [size]="modal.modalConfig().size || 'md'"
    (close)="modal.close()">
    @if (modal.modalConfig().template) {
      <ng-container [ngTemplateOutlet]="modal.modalConfig().template!"></ng-container>
    }
  </app-ui-modal>
}

<!-- Root Level Confirmation Modal -->
@if (modal.isConfirmOpen() && modal.confirmConfig()) {
  <app-ui-confirm-modal
    [title]="modal.confirmConfig()!.title"
    [message]="modal.confirmConfig()!.message"
    [confirmLabel]="modal.confirmConfig()!.confirmLabel || 'Confirm'"
    [confirmBtnClass]="modal.confirmConfig()!.confirmBtnClass || 'btn-primary'"
    (confirm)="modal.closeConfirm(true)"
    (cancel)="modal.closeConfirm(false)"
  ></app-ui-confirm-modal>
}
