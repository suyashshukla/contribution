<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="512" height="512" rx="80" fill="url(#gradient)"/>
  
  <!-- Globe icon -->
  <circle cx="256" cy="256" r="140" stroke="white" stroke-width="16" fill="none"/>
  <ellipse cx="256" cy="256" rx="60" ry="140" stroke="white" stroke-width="16" fill="none"/>
  <line x1="116" y1="256" x2="396" y2="256" stroke="white" stroke-width="16"/>
  <line x1="256" y1="116" x2="256" y2="396" stroke="white" stroke-width="16"/>
  
  <!-- PG letters -->
  <text x="256" y="450" font-family="Manrope, Arial, sans-serif" font-size="100" font-weight="800" fill="white" text-anchor="middle">PG</text>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
